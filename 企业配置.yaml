#------------------锚点复用---------------
#已写入防止dns泄露
#多ip指定
#meta核心
proxy-providers-dingyue: &airports

  gfwairport5:
    type: http
    interval: 3600
    path: ./gfwairport5.yaml
    url:  #此处填入机场订阅URL
    exclude-filter: "-10倍|剩余流量|套餐到期"
    health-check:
      enable: true
      url: https://www.google.com/generate_204
      interval: 900
      lazy: true


proxy-providers-config:
  proxy-providers-use:
  - gfwairport5

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: :9090
ipv6: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
experimental:
  ignore-resolve-fail: true
dns:
  enable: true
  prefer-h3: true
  listen: 0.0.0.0:53
  ipv6: true
  cache:
    size: 4096
    prefetch: true
    expire: 3600

  default-nameserver:
  - 1.1.1.1
  - 8.8.8.8
  - 9.9.9.9
  - 208.67.222.222
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:  # 指定不适用 fake-ip 的域名（防止订阅域名被 fake-ip）
    - '*.lan'
    - '*.local'
    - 'sub.huli168.com'
    - '+.huli168.com'
  #nameserver-policy:  #为以下域名指定DNS服务器
    #'www.baidu.com': '114.114.114.114'
    #'+.internal.crop.com': '10.0.0.1'
    #'geosite:cn': https://doh.pub/dns-query
  nameserver:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
  - https://dns.quad9.net/dns-query
  - tls://1.1.1.1:853
  - tls://8.8.8.8:853
  fallback:
  - https://doh.dns.sb/dns-query
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query
  - https://dns.quad9.net/dns-query
  - https://dns.twnic.tw/dns-query
  proxy-server-nameserver:   #代理节点域名解析服务器，仅用于解析代理节点的域名
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query
  - https://dns.quad9.net/dns-query
  - https://doh.dns.sb/dns-query
  - https://dns.twnic.tw/dns-query
  - 1.1.1.1
  - 8.8.8.8
  fallback-filter:
    geoip: false
    geoip-code: CN
    geosite:
    - gfw
    ipcidr:
    - 240.0.0.0/4
    domain:  #以下域名只使用fallback请求IP
    #这些域名被视为已污染，匹配到这些域名，会直接使用 fallback解析，不去使用 nameserver
    - '+.google.com'
    - '+.googlesyndication.com'
    - '+.facebook.com'
    - '+.youtube.com'
    - '+.x.com'
    - '+.apple.com'
    - '+.javbus22.com'
    - '+.jads.co'
    - '+.api.io.mi.com'
    - '+.icloud.com'
    - '+.lnaspiring.com'
    - '+.cloudflare.com'
    - '+.coo.wiki'
    - '+.ip.sb'
    - '+.doubleclick.net'
    - '+.amazonaws.com'
    - '+.cloudfront.net'
    - '+.openwrt.org'
    - '+.googleadservices.com'
    - '+.koolcenter.com'
    - '+.ghproxy.com'
    - '+.knjc.cfd'
    - '+.xiaoya.pro'
    - '+.lwjyj.com'
    - '+.vpdmm.cc'
    - '+.ac.jp'
    - '+.my-netdata.io'
    - '+.appcenter.ms'
    - 'vl.justloli.cn'
    - '3kloli.justloli.cn'
    - '+.hotloli.cloudns.org'


  experimental:
    ignore-resolve-fail: true



proxy-providers: *airports

pr:
  proxies:  #这里添加节点名称
proxies:   [] #节点添加到这里


